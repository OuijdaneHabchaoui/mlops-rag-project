# ============================================================================
# docker-compose.yml — Orchestration MLOps_RAG_Project
# Lance : MLflow tracking + container d'évaluation
# Usage : docker compose up -d mlflow         (juste MLflow)
#         docker compose run --rm eval        (un run d'éval ponctuel)
# ============================================================================

services:

  # ----------------------------------------------------------------------
  # MLflow Tracking Server
  # ----------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlops_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./experiments/mlflow.db:/mlflow/mlflow.db
      - ./mlartifacts:/mlflow/mlartifacts
    entrypoint: ["bash", "-c"]
    command: >
      "mlflow db upgrade sqlite:////mlflow/mlflow.db &&
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/mlartifacts
      --host 0.0.0.0
      --port 5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mlops_net

  # ----------------------------------------------------------------------
  # Eval Container (Ragas + tracking)
  # Lancé à la demande : docker compose run --rm eval [args]
  # ----------------------------------------------------------------------
  eval:
    build:
      context: .
      dockerfile: docker/Dockerfile.eval
    image: mlops-rag-eval:latest
    container_name: mlops_eval
    depends_on:
      mlflow:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      # Code Python en lecture (pour itérer rapidement en dev)
      - ./evaluation:/app/evaluation:ro
      - ./pipeline:/app/pipeline:ro
      - ./experiments:/app/experiments
      - ./scripts:/app/scripts:ro
      # Données en lecture seule
      - ./data:/app/data:ro
      # Artifacts & reports en lecture-écriture
      - ./reports:/app/reports
      - ./logs:/app/logs
    networks:
      - mlops_net
      # Permet d'accéder au shipping qui tourne en localhost:5010
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------------------------------------------------------------------
  # Prometheus (Metrics Collector)
  # ----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: mlops_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mlops_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------------------------------------------------------------------
  # Grafana (Visual Dashboard)
  # ----------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: mlops_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - mlops_net

# ============================================================================
# Network
# ============================================================================
networks:
  mlops_net:
    driver: bridge
    name: mlops_network

volumes:
  grafana_data:

# ============================================================================
# CI Pipeline — MLOps_RAG_Project
# Déclenché à chaque push et chaque pull request sur main/develop
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # permet déclenchement manuel depuis l'UI GitHub

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:

  # --------------------------------------------------------------------------
  # JOB 1 : QUALITÉ CODE (lint + format + type check)
  # --------------------------------------------------------------------------
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint avec Ruff
        run: ruff check . --output-format=github

      - name: Vérifier formatage Black
        run: black --check --diff .

  # --------------------------------------------------------------------------
  # JOB 2 : TESTS UNITAIRES
  # --------------------------------------------------------------------------
  tests:
    name: Tests unitaires (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest avec coverage
        run: |
          pytest tests/ \
            --cov=evaluation \
            --cov=pipeline \
            --cov=experiments \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not integration and not slow"

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # --------------------------------------------------------------------------
  # JOB 3 : SCAN SÉCURITÉ
  # --------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet requis par Gitleaks

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] pip-audit

      - name: Scan code avec Bandit
        run: bandit -r evaluation/ pipeline/ experiments/ utils/ scripts/ -ll
        continue-on-error: true  # rapport informatif, ne bloque pas le build

      - name: Scan dépendances avec pip-audit
        run: pip-audit -r requirements.txt --skip-editable
        continue-on-error: true

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # JOB 4 : VALIDATION DATASETS GOLDEN
  # --------------------------------------------------------------------------
  validate-datasets:
    name: Validation datasets
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Valider format JSONL des datasets
        run: |
          python << 'EOF'
          import json
          import sys
          from pathlib import Path

          required_fields = {"question", "expected_answer"}
          errors = []

          for dataset in Path("data").glob("*.jsonl"):
              with open(dataset, encoding="utf-8") as f:
                  for i, line in enumerate(f, 1):
                      try:
                          obj = json.loads(line)
                          missing = required_fields - set(obj.keys())
                          if missing:
                              errors.append(f"{dataset.name}:L{i} — champs manquants: {missing}")
                      except json.JSONDecodeError as e:
                          errors.append(f"{dataset.name}:L{i} — JSON invalide: {e}")

          if errors:
              for err in errors:
                  print(f"ERROR: {err}")
              sys.exit(1)
          print("Tous les datasets sont valides.")
          EOF

  # --------------------------------------------------------------------------
  # JOB 5 : RÉSUMÉ FINAL (pour status badge)
  # --------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, tests, security, validate-datasets]
    if: always()
    steps:
      - name: Vérifier que tous les jobs sont OK
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "Quality job a échoué"; exit 1
          fi
          if [[ "${{ needs.tests.result }}" != "success" ]]; then
            echo "Tests job a échoué"; exit 1
          fi
          if [[ "${{ needs.validate-datasets.result }}" != "success" ]]; then
            echo "Validation datasets a échoué"; exit 1
          fi
          echo "CI complet OK"
